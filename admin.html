<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>タカヒロコーヒー | テスト管理画面</title>
<style>
:root{--green:#06c755;--ink:#172033;--muted:#64748b;--line:#e2e8f0;--bg:#f6f8fa}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}header{background:#0f172a;color:#fff;padding:20px 24px;display:flex;justify-content:space-between;align-items:center}header h1{font-size:20px;margin:0}header a{color:#fff}main{max-width:1000px;margin:24px auto;padding:0 18px}.notice{background:#fffbeb;color:#92400e;padding:14px;border-radius:12px;margin-bottom:18px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px}.row{display:grid;grid-template-columns:80px 1.5fr 120px 100px auto;gap:12px;align-items:end}.full{grid-column:2/-1}label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px}input{width:100%;padding:10px;border:1px solid var(--line);border-radius:9px}button{border:0;border-radius:9px;padding:10px 14px;font-weight:700;cursor:pointer}.primary{background:var(--green);color:#fff}.danger{background:#fee2e2;color:#b91c1c}.secondary{background:#fff;border:1px solid var(--line)}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}h2{font-size:18px}.orders{display:grid;gap:10px}.order{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px}.order p{margin:5px 0;color:var(--muted)}@media(max-width:700px){.row{grid-template-columns:70px 1fr}.row>div{grid-column:auto}.row .full{grid-column:1/-1}.row button{grid-column:1/-1}}
</style>
</head>
<body>
<header><h1>タカヒロコーヒー テスト管理画面</h1><a href="./">ユーザー画面を開く</a></header>
<main><div class="notice">テスト版です。変更はこのブラウザ内に保存され、同じ端末のユーザー画面へ反映されます。GitHub上のデータは変更しません。</div><h2>商品管理</h2><div id="products"></div><div class="actions"><button class="primary" onclick="add()">商品を追加</button><button class="primary" onclick="save()">変更を保存</button><button class="secondary" onclick="resetData()">初期値に戻す</button></div><h2>テスト注文</h2><div id="orders" class="orders"></div></main>
<script>
const defaults=[{name:'エチオピア イルガチェフェ',price:1980,note:'浅煎り・フローラルな香り',stock:12,icon:'🌸'},{name:'季節のブレンド',price:1580,note:'中深煎り・バランスの良い味わい',stock:35,icon:'☕'},{name:'デカフェ コロンビア',price:1780,note:'カフェインレス・優しい風味',stock:8,icon:'🌙'}];let data=JSON.parse(localStorage.getItem('takahiro-products')||'null')||structuredClone(defaults);function render(){document.getElementById('products').innerHTML=data.map((p,i)=>`<div class="card row"><div><label>アイコン</label><input value="${p.icon}" oninput="data[${i}].icon=this.value"></div><div><label>商品名</label><input value="${p.name}" oninput="data[${i}].name=this.value"></div><div><label>価格</label><input type="number" value="${p.price}" oninput="data[${i}].price=+this.value"></div><div><label>在庫</label><input type="number" value="${p.stock}" oninput="data[${i}].stock=+this.value"></div><button class="danger" onclick="data.splice(${i},1);render()">削除</button><div class="full"><label>説明</label><input value="${p.note}" oninput="data[${i}].note=this.value"></div></div>`).join('');renderOrders()}function renderOrders(){const a=JSON.parse(localStorage.getItem('takahiro-orders')||'[]');document.getElementById('orders').innerHTML=a.length?a.map(o=>`<div class="order"><strong>${o.number}</strong><p>${o.product} / ¥${o.amount.toLocaleString()}<br>${o.date}</p></div>`).join(''):'<div class="order">注文はありません</div>'}function add(){data.push({name:'新商品',price:1500,note:'商品説明',stock:10,icon:'☕'});render()}function save(){localStorage.setItem('takahiro-products',JSON.stringify(data));alert('保存しました。同じブラウザでユーザー画面を再読み込みしてください。')}function resetData(){localStorage.removeItem('takahiro-products');data=structuredClone(defaults);render()}render();
</script>
</body>
</html>
