<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#f4f0e3">
<title>たかひろ珈琲 | LINEショップ</title>
<style>
:root{--brown:#3b1d0f;--brown2:#5b3420;--gold:#b79a58;--ink:#271b14;--muted:#73675d;--line:#d9cfbb;--paper:#f4f0e3;--cream:#fbf8ef}
*{box-sizing:border-box}body{margin:0;background:#e8e2d3;color:var(--ink);font-family:"Yu Mincho","Hiragino Mincho ProN","Noto Serif JP",serif}
button,input,select,textarea{font:inherit}.app{max-width:520px;min-height:100dvh;margin:auto;background:var(--paper);display:flex;flex-direction:column}
header{height:58px;padding:0 14px;display:grid;grid-template-columns:42px 1fr 42px;align-items:center;position:sticky;top:0;background:rgba(244,240,227,.96);z-index:5}
header strong{text-align:center;font-size:18px;letter-spacing:.08em}header button{border:0;background:transparent;color:var(--ink);font-size:25px}.profile{display:none;padding:7px 16px;background:#e8dfc8;color:var(--brown);font-size:12px;text-align:center}.profile.show{display:block}
main{flex:1;overflow:auto;padding:0 18px 112px}.hero{height:164px;margin:0 -18px 30px;background:url("./img/header.jpg") center 49%/cover no-repeat;position:relative}.hero::after{content:"";position:absolute;inset:auto 0 0;height:42px;background:linear-gradient(transparent,var(--paper))}
.brand-copy{display:none}.ornament{display:flex;align-items:center;gap:13px;color:var(--gold);margin:0 0 26px}.ornament::before,.ornament::after{content:"";height:1px;background:var(--gold);flex:1}.ornament span{font-size:20px;transform:rotate(-12deg)}
.screen{display:none}.screen.active{display:block}.head{margin-bottom:14px}.head h2{margin:0;font-size:20px}.head p{margin:4px 0 0;color:var(--muted);font-size:13px}
.product,.card{border:1px solid #ded6c7;border-radius:15px;padding:13px;margin-bottom:13px;background:rgba(255,255,255,.82);box-shadow:0 4px 12px rgba(59,29,15,.08)}.product{display:grid;grid-template-columns:68px 1fr auto;gap:12px;align-items:center}.product-photo{width:68px;height:68px;border-radius:50%;object-fit:cover;border:2px solid #fff;box-shadow:0 2px 7px #3b1d0f22}.product h3,.card h3{margin:0 0 3px;font-size:15px;letter-spacing:.02em}.product p,.card p{margin:0;color:var(--muted);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;font-size:11px;line-height:1.5}.price{font-size:16px;font-weight:800;color:var(--ink);margin-top:4px}
.btn{border:0;border-radius:11px;padding:11px 14px;font-weight:700;background:var(--brown);color:#fff;box-shadow:inset 0 0 0 1px #2b1309}.btn.secondary{background:var(--cream);color:var(--brown);border:1px solid var(--line);box-shadow:none}.wide{width:100%;margin-top:12px}
label{display:block;color:var(--muted);font-size:12px;font-weight:700;margin:12px 0 5px}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px;background:#fff}textarea{min-height:80px}
.line{display:flex;justify-content:space-between;gap:12px;margin:9px 0;font-size:13px}.total{border-top:1px solid var(--line);padding-top:12px;font-size:16px;font-weight:800}
nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);display:grid;grid-template-columns:repeat(4,1fr);background:#fff;border-top:1px solid #e6e0d5;padding:7px max(8px,env(safe-area-inset-right)) calc(7px + env(safe-area-inset-bottom)) max(8px,env(safe-area-inset-left));z-index:10;box-shadow:0 -4px 15px #3b1d0f0d}
nav button{border:0;background:#fff;color:#302b27;font-size:11px;padding:4px}nav span{display:block;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:23px;line-height:1.1;margin-bottom:3px}nav button.active{color:var(--brown);font-weight:800}
.notice{padding:8px 11px;border-radius:999px;background:#e9dfc6;color:#6f5527;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;font-size:10px;margin-bottom:18px;text-align:center}.toast{position:fixed;left:50%;bottom:90px;transform:translate(-50%,12px);background:var(--brown);color:#fff;padding:11px 16px;border-radius:10px;opacity:0;transition:.2s;z-index:20}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(min-width:600px){body{padding:24px}.app{min-height:calc(100dvh - 48px);border-radius:28px;overflow:hidden;box-shadow:0 20px 50px #0f172a22}nav{bottom:24px;border-radius:0 0 28px 28px}}
</style>
</head>
<body>
<div class="app">
  <header><button onclick="back()">‹</button><strong>たかひろ珈琲</strong><button onclick="show('cart')">🛒</button></header>
  <div id="profile" class="profile"></div>
  <main>
    <section id="home" class="screen active">
      <div class="hero"><div class="brand-copy">たかひろ珈琲</div></div>
      <div class="notice">テスト版です。決済・注文は実際には送信されません。</div>
      <div class="ornament"><span>⌁</span></div>
      <div class="head"><h2>おすすめ商品</h2><p>お好みの豆を選んでください</p></div>
      <div id="products"></div>
    </section>
    <section id="detail" class="screen"><div class="head"><h2>商品詳細</h2><p>容量・挽き方・数量を選択</p></div><div id="detailCard"></div></section>
    <section id="cart" class="screen"><div class="head"><h2>カート</h2><p>注文内容をご確認ください</p></div><div id="cartBody"></div></section>
    <section id="checkout" class="screen"><div class="head"><h2>配送情報</h2><p>テスト用の入力画面です</p></div><div class="card">
      <label>お名前</label><input id="name" value="山田 花子">
      <label>郵便番号</label><input value="690-0000">
      <label>住所</label><textarea>島根県雲南市木次町...</textarea>
      <label>決済方法</label><select><option>Square テスト決済</option></select>
      <button class="btn wide" onclick="pay()">テスト決済へ進む</button>
    </div></section>
    <section id="pay" class="screen"><div class="head"><h2>テスト決済</h2><p>実際の請求は発生しません</p></div><div class="card"><h3>Square Sandbox</h3><div id="payTotal" class="line total"></div><label>テストカード</label><input value="4242 4242 4242 4242" readonly><button class="btn wide" onclick="complete()">注文を確定する</button></div></section>
    <section id="complete" class="screen"><div class="head"><h2>ご注文ありがとうございます</h2></div><div class="card"><h3>テスト注文を受け付けました</h3><p id="completeText"></p></div><button id="lineSend" class="btn wide" style="display:none" onclick="sendLine()">注文内容をLINEへ送る</button><button class="btn secondary wide" onclick="show('home')">商品一覧へ戻る</button></section>
    <section id="orders" class="screen"><div class="head"><h2>注文確認</h2><p>この端末で作成したテスト注文</p></div><div id="ordersBody"></div></section>
    <section id="info" class="screen"><div class="head"><h2>ショップ情報</h2></div><div class="card"><h3>たかひろ珈琲</h3><p>決済確認後、2〜3営業日以内に発送<br>送料 全国一律185円</p></div></section>
  </main>
  <nav>
    <button data-page="home" class="active" onclick="show('home')"><span>⌂</span>商品</button>
    <button data-page="cart" onclick="show('cart')"><span>🛒</span>カート</button>
    <button data-page="orders" onclick="show('orders')"><span>▤</span>注文</button>
    <button data-page="info" onclick="show('info')"><span>ⓘ</span>情報</button>
  </nav>
</div>
<div id="toast" class="toast"></div>
<script src="./assets.js"></script>
<script src="./config.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const defaults=[
 {name:'エチオピア イルガチェフェ',price:1980,note:'浅煎り・フローラルな香り',stock:12,icon:'🌸',image:'1'},
 {name:'季節のブレンド',price:1580,note:'中深煎り・バランスの良い味わい',stock:35,icon:'☕',image:'2'},
 {name:'デカフェ コロンビア',price:1780,note:'カフェインレス・優しい風味',stock:8,icon:'🌙',image:'3'}
];
let products=JSON.parse(localStorage.getItem('takahiro-products')||'null')||defaults;
let cart=[],selected=0,lastOrder=null,history=[];
const yen=n=>'¥'+n.toLocaleString();
const imageFor=(p,i)=>window.COFFEE_IMAGES?.[p.image]||window.COFFEE_IMAGES?.[String(i+1)]||`./img/${i+1}.jpg`;
if(window.COFFEE_IMAGES?.header)document.querySelector('.hero').style.backgroundImage=`url("${window.COFFEE_IMAGES.header}")`;
function toast(t){const e=document.getElementById('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),1800)}
function show(id,push=true){const current=document.querySelector('.screen.active')?.id;if(push&&current&&current!==id)history.push(current);document.querySelectorAll('.screen').forEach(e=>e.classList.toggle('active',e.id===id));document.querySelectorAll('nav button').forEach(e=>e.classList.toggle('active',e.dataset.page===id));if(id==='cart')renderCart();if(id==='orders')renderOrders();document.querySelector('main').scrollTop=0}
function back(){history.length?show(history.pop(),false):show('home',false)}
function renderProducts(){document.getElementById('products').innerHTML=products.map((p,i)=>`<div class="product"><img class="product-photo" src="${imageFor(p,i)}" alt=""><div><h3>${p.name}</h3><p>${p.note}<br>在庫 ${p.stock}個</p><div class="price">${yen(p.price)} / 200g</div></div><button class="btn" onclick="openDetail(${i})">選ぶ</button></div>`).join('')}
function openDetail(i){selected=i;const p=products[i];document.getElementById('detailCard').innerHTML=`<div class="card"><img src="${imageFor(p,i)}" alt="" style="width:150px;height:150px;object-fit:cover;border-radius:50%;display:block;margin:0 auto 18px"><h3>${p.name}</h3><p>${p.note}</p><div class="price">${yen(p.price)} / 200g</div><label>容量</label><select id="size"><option value="200">200g</option><option value="400" selected>400g</option><option value="1000">1kg</option></select><label>挽き方</label><select id="grind"><option>豆のまま</option><option selected>中挽き</option><option>細挽き</option><option>粗挽き</option></select><label>数量</label><select id="qty"><option>1</option><option>2</option><option>3</option></select><button class="btn wide" onclick="addCart()">カートに入れる</button></div>`;show('detail')}
function addCart(){const p=products[selected],size=+document.getElementById('size').value,qty=+document.getElementById('qty').value;cart.push({name:p.name,size,qty,grind:document.getElementById('grind').value,unit:Math.round(p.price*size/200)});toast('カートに追加しました');show('cart')}
function totals(){const sub=cart.reduce((s,x)=>s+x.unit*x.qty,0),post=sub>=5000?0:185;return{sub,post,total:sub+post}}
function renderCart(){const e=document.getElementById('cartBody');if(!cart.length){e.innerHTML='<div class="card"><h3>カートは空です</h3></div>';return}const t=totals();e.innerHTML=cart.map((x,i)=>`<div class="card"><div class="line"><strong>${x.name}</strong><strong>${yen(x.unit*x.qty)}</strong></div><p>${x.size}g / ${x.grind} × ${x.qty}</p><button class="btn secondary wide" onclick="cart.splice(${i},1);renderCart()">削除</button></div>`).join('')+`<div class="card"><div class="line"><span>商品小計</span><span>${yen(t.sub)}</span></div><div class="line"><span>送料</span><span>${yen(t.post)}</span></div><div class="line total"><span>合計</span><span>${yen(t.total)}</span></div><button class="btn wide" onclick="show('checkout')">配送・決済へ進む</button></div>`}
function pay(){if(!cart.length)return show('cart');const t=totals();document.getElementById('payTotal').innerHTML=`<span>お支払い合計</span><span>${yen(t.total)}</span>`;show('pay')}
function complete(){const t=totals(),orders=JSON.parse(localStorage.getItem('takahiro-orders')||'[]');lastOrder={number:'TEST-'+Date.now().toString().slice(-6),product:cart.map(x=>x.name).join('・'),amount:t.total,date:new Date().toLocaleString('ja-JP')};orders.unshift(lastOrder);localStorage.setItem('takahiro-orders',JSON.stringify(orders.slice(0,20)));document.getElementById('completeText').innerHTML=`注文番号 <strong>${lastOrder.number}</strong><br>商品 ${lastOrder.product}<br>合計 ${yen(lastOrder.amount)}<br><br>これはテスト注文です。`;cart=[];show('complete');toast('テスト注文が完了しました')}
function renderOrders(){const orders=JSON.parse(localStorage.getItem('takahiro-orders')||'[]');document.getElementById('ordersBody').innerHTML=orders.length?orders.map(o=>`<div class="card"><h3>${o.number}</h3><p>${o.product}<br>${yen(o.amount)}<br>${o.date}</p></div>`).join(''):'<div class="card"><h3>テスト注文はありません</h3></div>'}
async function initLiff(){
  const id=window.APP_CONFIG?.liffId;
  if(!id||!window.liff)return;
  try{
    await liff.init({liffId:id});
    const openedInsideLine=/\bLine\//i.test(navigator.userAgent);
    const launchedByLiff=new URLSearchParams(location.search).has('liff.state');

    if(openedInsideLine&&!liff.isInClient()&&!launchedByLiff){
      location.replace(`https://liff.line.me/${id}`);
      return;
    }

    if(liff.isLoggedIn()){
      const p=await liff.getProfile();
      document.getElementById('profile').textContent=p.displayName+'さんとして接続中';
      document.getElementById('profile').classList.add('show');
      document.getElementById('name').value=p.displayName;
    }
    if(liff.isInClient())document.getElementById('lineSend').style.display='block';
  }catch(e){console.error(e)}
}
async function sendLine(){if(!lastOrder||!liff.isInClient())return;await liff.sendMessages([{type:'text',text:`たかひろ珈琲 テスト注文\n注文番号: ${lastOrder.number}\n商品: ${lastOrder.product}\n合計: ${yen(lastOrder.amount)}`}]);toast('LINEへ送信しました')}
renderProducts();initLiff();
</script>
</body>
</html>
